<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mucit Akademisi | IoT Kontrol</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a; /* Slate 900 */
      color: white;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    .glass-panel {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .btn-touch {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .btn-touch:active:not(:disabled) {
      transform: scale(0.96);
    }

    .loader {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-bottom-color: #fff;
      border-radius: 50%;
      display: inline-block;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* Custom Range Slider */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 24px;
      width: 24px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      margin-top: -8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 8px;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
    }
    input[type=range]:disabled::-webkit-slider-thumb {
      background: #64748b;
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAR1cyO7pFPM5RLvO308uAcSyf5HaqAizM",
      authDomain: "akillisera-b71d4.firebaseapp.com",
      projectId: "akillisera-b71d4",
      storageBucket: "akillisera-b71d4.firebasestorage.app",
      messagingSenderId: "326483167364",
      appId: "1:326483167364:web:77623670ecad58db099ad1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.FB = {
      auth, db, doc, onSnapshot, setDoc, signInAnonymously, onAuthStateChanged
    };

    window.APP_ID = "master-iot-final-v3";
    window.firebaseReady = true;
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useState, useRef } = React;

    // --- BİLEŞENLER ---

    // Toggle (Aç/Kapat) Butonu
    function Toggle({ title, emoji, active, onClick, activeColor, disabled }) {
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`w-full rounded-2xl p-5 flex items-center justify-between border btn-touch ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${
            active
              ? `${activeColor} text-white border-transparent shadow-lg`
              : "glass-panel text-slate-300 border-white/5"
          }`}
        >
          <div className="flex items-center gap-4">
            <div className="text-3xl bg-white/10 w-12 h-12 rounded-xl flex items-center justify-center">{emoji}</div>
            <div className="text-lg font-bold tracking-wide">{title}</div>
          </div>
          <div className={`w-14 h-8 rounded-full p-1 transition-all ${active ? "bg-white/30" : "bg-slate-700"}`}>
            <div className={`w-6 h-6 bg-white rounded-full transition-all shadow-sm ${active ? "translate-x-6" : "translate-x-0"}`}></div>
          </div>
        </button>
      );
    }

    // Sensör Veri Kartı
    function SensorCard({ title, value, unit, emoji, colorClass }) {
      return (
        <div className={`glass-panel rounded-2xl p-5 flex flex-col items-center justify-center gap-2 ${colorClass}`}>
          <div className="text-3xl mb-1">{emoji}</div>
          <div className="text-slate-400 text-xs font-bold uppercase tracking-wider">{title}</div>
          <div className="text-3xl font-black text-white">
            {value}<span className="text-lg text-white/60 ml-1">{unit}</span>
          </div>
        </div>
      );
    }

    // --- ANA UYGULAMA ---

    function App() {
      const [ready, setReady] = useState(false);
      const [user, setUser] = useState(null);
      const [pin, setPin] = useState("");
      const [loggedIn, setLoggedIn] = useState(false);
      const [loading, setLoading] = useState(false);
      const [errorMsg, setErrorMsg] = useState("");
      
      // Hangi projenin aktif olduğunu tutan state (home, greenhouse, parking)
      const [projectMode, setProjectMode] = useState(null);

      // Sistem Durumları
      const [homeData, setHomeData] = useState({ light: false, kitchen: false, plug: false, ac: false, garden: false });
      const [seraData, setSeraData] = useState({ temp: 0, hum: 0, auto: false, pump: false, motorSpeed: 0 });
      const [parkData, setParkData] = useState({ occupied: 0, slots: [false, false, false, false] });

      const [localMotorSpeed, setLocalMotorSpeed] = useState(0);

      useEffect(() => {
        const t = setInterval(() => {
          if (window.firebaseReady && window.FB) {
            setReady(true);
            clearInterval(t);
          }
        }, 100);
        return () => clearInterval(t);
      }, []);

      useEffect(() => {
        if (!ready) return;

        async function authStart() {
          try {
            await window.FB.signInAnonymously(window.FB.auth);
          } catch (e) {
            setErrorMsg("Bağlantı hatası: " + (e.code || e.message));
          }
        }
        authStart();

        const unsub = window.FB.onAuthStateChanged(window.FB.auth, (u) => {
          setUser(u || null);
        });
        return () => unsub && unsub();
      }, [ready]);

      // Firebase Veri Dinleyicileri
      useEffect(() => {
        if (!user) return;

        const db = window.FB.db;
        const appId = window.APP_ID;
        
        const unsubHome = window.FB.onSnapshot(
          window.FB.doc(db, "artifacts", appId, "public", "data", "home", "status"),
          (snap) => { if (snap.exists()) setHomeData(prev => ({ ...prev, ...snap.data() })); }
        );

        const unsubSera = window.FB.onSnapshot(
          window.FB.doc(db, "artifacts", appId, "public", "data", "greenhouse", "status"),
          (snap) => {
            if (snap.exists()) {
              const d = snap.data();
              const getVal = (key, fallback) => {
                if (d[key] !== undefined) return d[key];
                if (d.fields && d.fields[key]) {
                  return d.fields[key].integerValue !== undefined ? Number(d.fields[key].integerValue) : 
                         d.fields[key].booleanValue !== undefined ? d.fields[key].booleanValue : fallback;
                }
                return fallback;
              };

              const newSpeed = getVal("motorSpeed", 0);
              setSeraData({
                temp: getVal("temp", 0),
                hum: getVal("hum", 0),
                auto: getVal("auto", false),
                pump: getVal("pump", false),
                motorSpeed: newSpeed
              });
              setLocalMotorSpeed(newSpeed);
            }
          }
        );

        const unsubPark = window.FB.onSnapshot(
          window.FB.doc(db, "artifacts", appId, "public", "data", "parking", "status"),
          (snap) => {
            if (snap.exists()) {
              const d = snap.data();
              let occupied = 0;
              let slots = [false, false, false, false];

              if (d.occupied !== undefined) {
                occupied = d.occupied;
                slots = d.slots || slots;
              } else if (d.fields) {
                occupied = d.fields.occupied?.integerValue ? Number(d.fields.occupied.integerValue) : 0;
                if (d.fields.slots?.arrayValue?.values) {
                  slots = d.fields.slots.arrayValue.values.map(v => v.booleanValue === true);
                }
              }
              setParkData({ occupied, slots });
            }
          }
        );

        return () => { unsubHome(); unsubSera(); unsubPark(); };
      }, [user]);

      // PIN KONTROL SİSTEMİ
      function login() {
        if (pin === "0000") {
          setProjectMode("home");
          setLoggedIn(true);
          setErrorMsg("");
        } else if (pin === "1111") {
          setProjectMode("greenhouse");
          setLoggedIn(true);
          setErrorMsg("");
        } else if (pin === "2222") {
          setProjectMode("parking");
          setLoggedIn(true);
          setErrorMsg("");
        } else {
          setErrorMsg("Hatalı Yetki Kodu!");
        }
      }

      async function toggleHome(field) {
        if (!user) return;
        setLoading(true);
        try {
          const ref = window.FB.doc(window.FB.db, "artifacts", window.APP_ID, "public", "data", "home", "status");
          await window.FB.setDoc(ref, { [field]: !homeData[field] }, { merge: true });
        } catch (e) { setErrorMsg("Komut iletilemedi."); }
        setLoading(false);
      }

      async function updateSera(field, value) {
        if (!user) return;
        setLoading(true);
        try {
          const ref = window.FB.doc(window.FB.db, "artifacts", window.APP_ID, "public", "data", "greenhouse", "status");
          await window.FB.setDoc(ref, { [field]: value }, { merge: true });
        } catch (e) { setErrorMsg("Komut iletilemedi."); }
        setLoading(false);
      }

      if (!ready) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center px-6">
            <span className="loader mb-4"></span>
            <div className="font-bold tracking-widest uppercase text-xs text-slate-400">
              Sistem Başlatılıyor
            </div>
          </div>
        );
      }

      // GİRİŞ EKRANI (MUCİT AKADEMİSİ)
      if (!loggedIn) {
        return (
          <div className="min-h-screen flex items-center justify-center px-6 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-slate-50">
            <div className="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl relative overflow-hidden border border-slate-200">
              <div className="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
              
              <div className="text-center mb-8 mt-4 flex flex-col items-center">
                {/* LOGO ALANI */}
                <div className="mb-3 flex justify-center w-full">
                  <img 
                    src="mucit_logo.png" 
                    alt="Mucit Akademisi Logo" 
                    className="h-32 object-contain"
                    onError={(e) => {
                      e.target.style.display = 'none';
                      e.target.nextSibling.style.display = 'block';
                    }}
                  />
                  {/* SVG YEDEK LOGO (Eğer mucit_logo.png dosyası klasörde yoksa kodla çizilmiş orijinal logonuz devreye girer) */}
                  <div style={{ display: 'none' }}>
                    <svg width="80" height="110" viewBox="0 0 100 120" className="drop-shadow-md">
                      {/* Şapka */}
                      <polygon points="50,10 90,25 50,40 10,25" fill="#1d70b8" />
                      <polygon points="25,30 25,45 50,55 75,45 75,30 50,40" fill="#1d70b8" />
                      {/* Ampul ve Püskül */}
                      <line x1="15" y1="25" x2="15" y2="55" stroke="#1d70b8" strokeWidth="3" />
                      <circle cx="15" cy="60" r="7" fill="#1d70b8" />
                      <circle cx="15" cy="60" r="3" fill="#ffffff" />
                      {/* M Harfi */}
                      <path d="M 30,45 L 30,75 L 50,60 L 70,75 L 70,45" fill="none" stroke="#000000" strokeWidth="14" strokeLinejoin="miter" strokeLinecap="square" />
                      {/* A Harfi / Kalem Ucu */}
                      <path d="M 30,85 L 50,115 L 70,85 Z" fill="#1d70b8" />
                      <path d="M 42,95 L 58,95" fill="none" stroke="#ffffff" strokeWidth="4" />
                    </svg>
                  </div>
                </div>

                {/* YAZI KISMI (Logonun altında her zaman görünür) */}
                <h1 className="text-center text-4xl font-black tracking-tighter text-slate-900 leading-[1.1]">
                  MUCİT<br/><span className="text-blue-600">AKADEMİSİ</span>
                </h1>
              </div>

              <input
                type="password"
                maxLength="4"
                value={pin}
                onChange={(e) => setPin(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && login()}
                placeholder="PROJE PIN KODU"
                className="w-full rounded-xl bg-slate-50 border border-slate-200 px-5 py-4 text-center text-xl tracking-[0.2em] text-slate-900 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all mb-4 font-bold placeholder:tracking-normal placeholder:font-normal placeholder:text-slate-400"
              />

              <button
                onClick={login}
                className="w-full rounded-xl bg-blue-600 hover:bg-blue-700 text-white py-4 font-bold uppercase tracking-wider btn-touch shadow-lg shadow-blue-600/20"
              >
                Giriş Yap
              </button>

              {errorMsg && (
                <div className="mt-4 p-3 rounded-lg bg-red-50 border border-red-100 text-red-500 text-center text-sm font-medium">
                  {errorMsg}
                </div>
              )}
            </div>
          </div>
        );
      }

      // Dinamik Başlık ve İkon Seçimi
      let projectTitle = "IoT KONTROL";
      let projectIcon = "⚡";
      
      if (projectMode === "home") { projectTitle = "AKILLI EV"; projectIcon = "🏠"; }
      else if (projectMode === "greenhouse") { projectTitle = "AKILLI SERA"; projectIcon = "🌱"; }
      else if (projectMode === "parking") { projectTitle = "AKILLI OTOPARK"; projectIcon = "🅿️"; }

      return (
        <div className="min-h-screen pb-12">
          {/* Header */}
          <header className="px-6 py-5 glass-panel sticky top-0 z-50 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-lg shadow-lg">
                {projectIcon}
              </div>
              <div>
                <div className="text-lg font-black tracking-tight leading-tight text-white">{projectTitle}</div>
                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1">
                  <span className={`w-2 h-2 rounded-full ${user ? 'bg-green-500' : 'bg-red-500'}`}></span>
                  MUCİT AKADEMİSİ
                </div>
              </div>
            </div>

            <button
              onClick={() => { setLoggedIn(false); setPin(""); setProjectMode(null); }}
              className="px-4 py-2 rounded-lg bg-white/5 border border-white/10 text-sm font-semibold btn-touch hover:bg-white/10"
            >
              Çıkış
            </button>
          </header>

          <main className="max-w-md mx-auto px-4 py-6">
            
            {errorMsg && (
              <div className="mb-6 rounded-xl border border-red-500/30 bg-red-500/10 p-4 text-red-200 text-sm text-center flex items-center justify-center gap-2">
                <span>⚠️</span> {errorMsg}
                <button onClick={() => setErrorMsg("")} className="ml-2 font-bold hover:text-white">✕</button>
              </div>
            )}

            {/* AKILLI EV PROJESİ */}
            {projectMode === "home" && (
              <div className="space-y-4 animate-[fadeIn_0.3s_ease-out]">
                <div className="mb-6">
                  <h2 className="text-2xl font-black">Ev Kontrolü</h2>
                  <p className="text-slate-400 text-sm">Aydınlatma ve cihazları yönetin.</p>
                </div>

                <Toggle title="Salon Işığı" emoji="💡" active={homeData.light} onClick={() => toggleHome("light")} activeColor="bg-amber-500" disabled={loading} />
                <Toggle title="Mutfak Işığı" emoji="🍽️" active={homeData.kitchen} onClick={() => toggleHome("kitchen")} activeColor="bg-blue-500" disabled={loading} />
                <Toggle title="Akıllı Priz" emoji="🔌" active={homeData.plug} onClick={() => toggleHome("plug")} activeColor="bg-emerald-500" disabled={loading} />
                <Toggle title="Klima (AC)" emoji="❄️" active={homeData.ac} onClick={() => toggleHome("ac")} activeColor="bg-cyan-500" disabled={loading} />
                <Toggle title="Bahçe Aydınlatma" emoji="🌞" active={homeData.garden} onClick={() => toggleHome("garden")} activeColor="bg-purple-500" disabled={loading} />
              </div>
            )}

            {/* AKILLI SERA PROJESİ */}
            {projectMode === "greenhouse" && (
              <div className="space-y-4 animate-[fadeIn_0.3s_ease-out]">
                <div className="mb-6 flex justify-between items-end">
                  <div>
                    <h2 className="text-2xl font-black">Sera İzleme</h2>
                    <p className="text-slate-400 text-sm">İklim ve sulama sistemleri.</p>
                  </div>
                  {loading && <span className="loader border-green-500"></span>}
                </div>

                <div className="grid grid-cols-2 gap-4 mb-6">
                  <SensorCard title="Sıcaklık" value={seraData.temp} unit="°C" emoji="🌡️" colorClass={seraData.temp > 30 ? "border-red-500/50 bg-red-500/10" : ""} />
                  <SensorCard title="Nem" value={seraData.hum} unit="%" emoji="💧" colorClass={seraData.hum < 40 ? "border-amber-500/50 bg-amber-500/10" : ""} />
                </div>

                <div className="glass-panel p-1 rounded-2xl mb-4">
                  <Toggle 
                    title="Otonom Mod (Yapay Zeka)" 
                    emoji="🤖" 
                    active={seraData.auto} 
                    onClick={() => updateSera("auto", !seraData.auto)} 
                    activeColor="bg-gradient-to-r from-green-500 to-emerald-600" 
                    disabled={loading} 
                  />
                  {seraData.auto && (
                    <div className="px-5 pb-4 pt-2 text-xs text-emerald-400 font-medium">
                      ✓ Sistem sıcaklık 30°C'yi aşarsa fanı, nem %40'ın altına düşerse pompayı otomatik çalıştırır.
                    </div>
                  )}
                </div>

                <div className={`space-y-4 transition-opacity ${seraData.auto ? 'opacity-40 pointer-events-none' : 'opacity-100'}`}>
                  <h3 className="text-sm font-bold text-slate-500 uppercase tracking-widest ml-2">Manuel Kontroller</h3>
                  
                  <Toggle 
                    title="Su Pompası" 
                    emoji="🚰" 
                    active={seraData.pump} 
                    onClick={() => updateSera("pump", !seraData.pump)} 
                    activeColor="bg-blue-500" 
                    disabled={loading || seraData.auto} 
                  />

                  <div className="glass-panel rounded-2xl p-5 border border-white/5">
                    <div className="flex justify-between items-center mb-4">
                      <div className="flex items-center gap-4">
                        <div className="text-3xl bg-white/10 w-12 h-12 rounded-xl flex items-center justify-center">🌀</div>
                        <div className="text-lg font-bold">Havalandırma Fanı</div>
                      </div>
                      <div className="text-lg font-bold text-cyan-400">
                        {Math.round((localMotorSpeed / 255) * 100)}%
                      </div>
                    </div>
                    
                    <input 
                      type="range" 
                      min="0" 
                      max="255" 
                      value={localMotorSpeed}
                      onChange={(e) => setLocalMotorSpeed(Number(e.target.value))}
                      onMouseUp={(e) => updateSera("motorSpeed", Number(e.target.value))}
                      onTouchEnd={(e) => updateSera("motorSpeed", Number(e.target.value))}
                      disabled={loading || seraData.auto}
                      className="w-full mt-2"
                    />
                  </div>
                </div>
              </div>
            )}

            {/* AKILLI OTOPARK PROJESİ */}
            {projectMode === "parking" && (
              <div className="space-y-4 animate-[fadeIn_0.3s_ease-out]">
                <div className="mb-6 flex justify-between items-end">
                  <div>
                    <h2 className="text-2xl font-black">Sensör Durumu</h2>
                    <p className="text-slate-400 text-sm">Canlı doluluk durumu.</p>
                  </div>
                </div>

                <div className="glass-panel rounded-3xl p-6 text-center mb-8 border border-white/5">
                  <div className="text-6xl mb-4 font-black">
                    <span className="text-blue-400">{4 - parkData.occupied}</span>
                    <span className="text-slate-500 text-3xl mx-2">/</span>
                    <span className="text-slate-500 text-4xl">4</span>
                  </div>
                  <div className="text-sm font-bold uppercase tracking-widest text-slate-400">
                    Boş Park Yeri
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-4">
                  {[0, 1, 2, 3].map((index) => {
                    const isFull = parkData.slots[index];
                    return (
                      <div 
                        key={index}
                        className={`relative rounded-2xl p-6 border-2 flex flex-col items-center justify-center gap-3 transition-colors ${
                          isFull 
                            ? "bg-red-500/10 border-red-500/30" 
                            : "bg-emerald-500/10 border-emerald-500/30"
                        }`}
                      >
                        <div className="absolute top-3 left-3 text-xs font-bold text-slate-500">P{index + 1}</div>
                        
                        <div className={`text-5xl transition-transform ${isFull ? 'scale-100' : 'scale-75 opacity-50 grayscale'}`}>
                          {isFull ? "🚗" : "🅿️"}
                        </div>
                        
                        <div className={`text-sm font-bold tracking-widest uppercase ${isFull ? 'text-red-400' : 'text-emerald-400'}`}>
                          {isFull ? "Dolu" : "Boş"}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

          </main>
          
          <style dangerouslySetInnerHTML={{__html: `
            @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
          `}} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body> 
</html>
