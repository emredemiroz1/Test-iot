<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akıllı Ev Kontrol</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, #020617 0%, #000814 100%);
      color: white;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    .glass {
      background: rgba(30, 41, 59, 0.70);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .btn-touch {
      transition: all 0.2s ease;
      cursor: pointer;
      user-select: none;
    }

    .btn-touch:active {
      transform: scale(0.98);
    }

    .loader {
      width: 16px;
      height: 16px;
      border: 2px solid #ffffff;
      border-bottom-color: transparent;
      border-radius: 50%;
      display: inline-block;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAR1cyO7pFPM5RLvO308uAcSyf5HaqAizM",
      authDomain: "akillisera-b71d4.firebaseapp.com",
      projectId: "akillisera-b71d4",
      storageBucket: "akillisera-b71d4.firebasestorage.app",
      messagingSenderId: "326483167364",
      appId: "1:326483167364:web:77623670ecad58db099ad1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.FB = {
      auth,
      db,
      doc,
      setDoc,
      onSnapshot,
      signInAnonymously,
      onAuthStateChanged
    };

    window.APP_ID = "master-iot-final-v3";
    window.firebaseReady = true;
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function Icon({ name, size = 24, className = "" }) {
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }, [name]);

      return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
    }

    function App() {
      const [ready, setReady] = useState(false);
      const [user, setUser] = useState(null);
      const [pin, setPin] = useState("");
      const [loggedIn, setLoggedIn] = useState(false);
      const [loadingKey, setLoadingKey] = useState("");
      const [message, setMessage] = useState("");
      const [homeData, setHomeData] = useState({
        light: false,
        kitchen: false,
        plug: false,
        ac: false,
        garden: false
      });

      useEffect(() => {
        const timer = setInterval(() => {
          if (window.firebaseReady && window.FB) {
            setReady(true);
            clearInterval(timer);
          }
        }, 100);

        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        if (!ready) return;

        async function startAuth() {
          try {
            await window.FB.signInAnonymously(window.FB.auth);
          } catch (e) {
            console.error("Auth hatası:", e);
            setMessage("Firebase bağlantı hatası: " + (e.code || e.message));
          }
        }

        startAuth();

        const unsub = window.FB.onAuthStateChanged(window.FB.auth, (u) => {
          setUser(u || null);
        });

        return () => {
          if (unsub) unsub();
        };
      }, [ready]);

      useEffect(() => {
        if (!user) return;

        const ref = window.FB.doc(
          window.FB.db,
          "artifacts",
          window.APP_ID,
          "public",
          "data",
          "home",
          "status"
        );

        const unsub = window.FB.onSnapshot(
          ref,
          async (snap) => {
            if (snap.exists()) {
              const data = snap.data();
              setHomeData({
                light: !!data.light,
                kitchen: !!data.kitchen,
                plug: !!data.plug,
                ac: !!data.ac,
                garden: !!data.garden
              });
            } else {
              await window.FB.setDoc(ref, {
                light: false,
                kitchen: false,
                plug: false,
                ac: false,
                garden: false
              }, { merge: true });
            }
          },
          (err) => {
            console.error("Snapshot hatası:", err);
            setMessage("Veri okunamadı: " + (err.code || err.message));
          }
        );

        return () => {
          if (unsub) unsub();
        };
      }, [user]);

      function login() {
        if (pin === "0000") {
          setLoggedIn(true);
          setMessage("");
        } else {
          alert("Hatalı PIN! Akıllı Ev için 0000 kullan.");
        }
      }

      async function toggleField(field, currentValue) {
        if (!user) {
          setMessage("Önce Firebase bağlantısı kurulmalı.");
          return;
        }

        try {
          setLoadingKey(field);
          setMessage("");

          const ref = window.FB.doc(
            window.FB.db,
            "artifacts",
            window.APP_ID,
            "public",
            "data",
            "home",
            "status"
          );

          await window.FB.setDoc(ref, {
            [field]: !currentValue
          }, { merge: true });

        } catch (e) {
          console.error("Toggle hatası:", e);
          setMessage("Komut gönderilemedi: " + (e.code || e.message));
        } finally {
          setLoadingKey("");
        }
      }

      function DeviceButton({ label, icon, field, value, activeClass }) {
        return (
          <button
            onClick={() => toggleField(field, value)}
            disabled={loadingKey !== ""}
            className={
              "w-full rounded-[34px] px-8 py-8 flex items-center justify-between border btn-touch " +
              (value
                ? activeClass + " text-white border-transparent shadow-xl"
                : "bg-slate-800 text-slate-300 border-white/5")
            }
          >
            <div className="flex items-center gap-5">
              <Icon name={icon} size={28} />
              <span className="text-lg font-black italic uppercase tracking-tight">
                {label}
              </span>
            </div>

            <div className={"w-14 h-8 rounded-full p-1 transition-all " + (value ? "bg-white/20" : "bg-slate-700")}>
              <div className={"w-6 h-6 bg-white rounded-full transition-all " + (value ? "translate-x-6" : "translate-x-0")}></div>
            </div>
          </button>
        );
      }

      if (!ready) {
        return (
          <div className="min-h-screen flex items-center justify-center px-6">
            <div className="glass rounded-[32px] px-8 py-8 text-center">
              <span className="loader mb-4"></span>
              <div className="mt-4 text-sm font-bold uppercase tracking-widest text-slate-300">
                Firebase hazırlanıyor
              </div>
            </div>
          </div>
        );
      }

      if (!loggedIn) {
        return (
          <div className="min-h-screen flex items-center justify-center px-6">
            <div className="glass w-full max-w-sm rounded-[38px] p-8">
              <div className="w-20 h-20 rounded-[24px] bg-indigo-600 flex items-center justify-center mx-auto mb-6">
                <Icon name="house" size={38} />
              </div>

              <h1 className="text-center text-3xl font-black italic uppercase tracking-tight">
                Akıllı Ev
              </h1>

              <p className="text-center text-slate-400 text-xs mt-2 mb-8 uppercase tracking-[0.25em]">
                Pin Girişi
              </p>

              <input
                type="text"
                value={pin}
                onChange={(e) => setPin(e.target.value)}
                placeholder="0000"
                className="w-full rounded-[24px] bg-slate-900 border border-white/10 px-5 py-4 text-center text-2xl tracking-[0.35em] outline-none mb-4"
              />

              <button
                onClick={login}
                className="w-full rounded-[24px] bg-indigo-600 hover:bg-indigo-500 py-4 font-black uppercase btn-touch"
              >
                Giriş Yap
              </button>

              {message && (
                <div className="mt-4 text-sm text-red-400 text-center">
                  {message}
                </div>
              )}
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          <header className="px-6 py-6 border-b border-white/5 flex items-center justify-between bg-slate-950/40">
            <div className="flex items-center gap-4">
              <div className="w-16 h-16 rounded-[18px] bg-indigo-600 flex items-center justify-center">
                <Icon name="house" size={30} />
              </div>
              <div className="text-2xl font-black italic uppercase tracking-tight">
                Akıllı Ev
              </div>
            </div>

            <button
              onClick={() => {
                setLoggedIn(false);
                setPin("");
              }}
              className="glass px-4 py-3 rounded-2xl btn-touch"
            >
              <Icon name="log-out" size={20} />
            </button>
          </header>

          <main className="max-w-3xl mx-auto px-6 py-8">
            {message && (
              <div className="mb-5 rounded-[24px] border border-red-500/50 bg-red-500/10 px-5 py-4 text-red-400 text-center font-semibold">
                {message}
              </div>
            )}

            <div className="mb-5 rounded-[42px] bg-indigo-950/70 border border-white/5 px-8 py-10 text-center">
              <div className="text-4xl font-black italic uppercase text-indigo-300 tracking-tight">
                Ev Kontrol Üssü
              </div>
              <div className="text-slate-400 text-sm font-bold uppercase tracking-[0.2em] mt-2">
                Sistem Güvenliği Aktif
              </div>
            </div>

            <div className="space-y-4">
              <DeviceButton
                label="Salon Işığı"
                icon="zap"
                field="light"
                value={homeData.light}
                activeClass="bg-yellow-500"
              />

              <DeviceButton
                label="Mutfak Işığı"
                icon="utensils-crossed"
                field="kitchen"
                value={homeData.kitchen}
                activeClass="bg-blue-500"
              />

              <DeviceButton
                label="Akıllı Priz"
                icon="power"
                field="plug"
                value={homeData.plug}
                activeClass="bg-emerald-500"
              />

              <DeviceButton
                label="Klima Sistemi"
                icon="snowflake"
                field="ac"
                value={homeData.ac}
                activeClass="bg-cyan-500"
              />

              <DeviceButton
                label="Bahçe Aydınlatma"
                icon="sun"
                field="garden"
                value={homeData.garden}
                activeClass="bg-orange-500"
              />
            </div>
          </main>

          <div className="fixed bottom-6 left-1/2 -translate-x-1/2 glass rounded-[28px] px-6 py-4 flex items-center gap-3">
            {loadingKey ? <span className="loader"></span> : <Icon name="refresh-cw" size={16} className="text-blue-400" />}
            <span className="text-xs font-black uppercase tracking-[0.2em] text-white">
              {loadingKey ? "Komut Gönderiliyor" : "Canlı Senkronizasyon"}
            </span>
          </div>
        </div>
      );
    }

    try {
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    } catch (e) {
      document.body.innerHTML = `
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#020617;color:white;font-family:Inter,Arial,sans-serif;padding:24px;">
          <div style="max-width:700px;background:#111827;border:1px solid rgba(255,255,255,.08);padding:24px;border-radius:20px;">
            <h2 style="margin-top:0;color:#f87171;">Uygulama Hatası</h2>
            <pre style="white-space:pre-wrap;color:#cbd5e1;">${String(e)}</pre>
          </div>
        </div>
      `;
      console.error(e);
    }
  </script>
</body>
</html>
