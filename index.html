<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akıllı Ev Kontrol</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #020617 0%, #000814 100%);
      color: white;
      min-height: 100vh;
    }

    .panel {
      background: rgba(30, 41, 59, 0.75);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
    }

    .btn-touch {
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .btn-touch:active {
      transform: scale(0.98);
    }

    .loader {
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-bottom-color: transparent;
      border-radius: 50%;
      display: inline-block;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAR1cyO7pFPM5RLvO308uAcSyf5HaqAizM",
      authDomain: "akillisera-b71d4.firebaseapp.com",
      projectId: "akillisera-b71d4",
      storageBucket: "akillisera-b71d4.firebasestorage.app",
      messagingSenderId: "326483167364",
      appId: "1:326483167364:web:77623670ecad58db099ad1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.FB = {
      auth,
      db,
      doc,
      onSnapshot,
      setDoc,
      signInAnonymously,
      onAuthStateChanged
    };

    window.APP_ID = "master-iot-final-v3";
    window.firebaseReady = true;
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useState } = React;

    window.onerror = function(message, source, lineno, colno, error) {
      document.getElementById("root").innerHTML = `
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#020617;color:white;">
          <div style="max-width:760px;background:#111827;border:1px solid rgba(255,255,255,.08);padding:24px;border-radius:18px;">
            <h2 style="margin-top:0;color:#f87171;">JavaScript Hatası</h2>
            <p><b>Mesaj:</b> ${message}</p>
            <p><b>Satır:</b> ${lineno}</p>
            <p><b>Sütun:</b> ${colno}</p>
            <pre style="white-space:pre-wrap;color:#cbd5e1;">${error ? error.stack : ""}</pre>
          </div>
        </div>
      `;
      return true;
    };

    function Toggle({ title, emoji, active, onClick, activeClass, disabled }) {
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={
            "w-full rounded-[30px] px-7 py-7 flex items-center justify-between border btn-touch " +
            (active
              ? activeClass + " text-white border-transparent shadow-xl"
              : "bg-slate-800 text-slate-300 border-white/5")
          }
        >
          <div className="flex items-center gap-4">
            <div className="text-3xl">{emoji}</div>
            <div className="text-lg font-bold italic uppercase">{title}</div>
          </div>

          <div className={"w-14 h-8 rounded-full p-1 transition-all " + (active ? "bg-white/20" : "bg-slate-700")}>
            <div className={"w-6 h-6 bg-white rounded-full transition-all " + (active ? "translate-x-6" : "translate-x-0")}></div>
          </div>
        </button>
      );
    }

    function App() {
      const [ready, setReady] = useState(false);
      const [user, setUser] = useState(null);
      const [pin, setPin] = useState("");
      const [loggedIn, setLoggedIn] = useState(false);
      const [loading, setLoading] = useState(false);
      const [errorMsg, setErrorMsg] = useState("");

      const [homeData, setHomeData] = useState({
        light: false,
        kitchen: false,
        plug: false,
        ac: false,
        garden: false
      });

      useEffect(() => {
        const t = setInterval(() => {
          if (window.firebaseReady && window.FB) {
            setReady(true);
            clearInterval(t);
          }
        }, 100);
        return () => clearInterval(t);
      }, []);

      useEffect(() => {
        if (!ready) return;

        async function authStart() {
          try {
            await window.FB.signInAnonymously(window.FB.auth);
          } catch (e) {
            console.error(e);
            setErrorMsg("Firebase auth hatası: " + (e.code || e.message));
          }
        }

        authStart();

        const unsub = window.FB.onAuthStateChanged(window.FB.auth, (u) => {
          setUser(u || null);
        });

        return () => unsub && unsub();
      }, [ready]);

      useEffect(() => {
        if (!user) return;

        const ref = window.FB.doc(
          window.FB.db,
          "artifacts",
          window.APP_ID,
          "public",
          "data",
          "home",
          "status"
        );

        const unsub = window.FB.onSnapshot(
          ref,
          async (snap) => {
            try {
              if (snap.exists()) {
                const d = snap.data() || {};
                setHomeData({
                  light: !!d.light,
                  kitchen: !!d.kitchen,
                  plug: !!d.plug,
                  ac: !!d.ac,
                  garden: !!d.garden
                });
              } else {
                await window.FB.setDoc(ref, {
                  light: false,
                  kitchen: false,
                  plug: false,
                  ac: false,
                  garden: false
                }, { merge: true });
              }
            } catch (e) {
              console.error(e);
              setErrorMsg("Veri okuma hatası: " + (e.code || e.message));
            }
          },
          (err) => {
            console.error(err);
            setErrorMsg("Snapshot hatası: " + (err.code || err.message));
          }
        );

        return () => unsub && unsub();
      }, [user]);

      function login() {
        if (pin === "0000") {
          setLoggedIn(true);
          setErrorMsg("");
        } else {
          alert("Akıllı Ev için PIN: 0000");
        }
      }

      async function toggleField(field) {
        if (!user) {
          setErrorMsg("Firebase bağlantısı henüz hazır değil.");
          return;
        }

        try {
          setLoading(true);
          setErrorMsg("");

          const ref = window.FB.doc(
            window.FB.db,
            "artifacts",
            window.APP_ID,
            "public",
            "data",
            "home",
            "status"
          );

          const current = !!homeData[field];

          await window.FB.setDoc(ref, {
            [field]: !current
          }, { merge: true });

        } catch (e) {
          console.error(e);
          setErrorMsg("Yazma hatası: " + (e.code || e.message));
        } finally {
          setLoading(false);
        }
      }

      if (!ready) {
        return (
          <div className="min-h-screen flex items-center justify-center px-6">
            <div className="panel rounded-[24px] px-8 py-8 text-center">
              <span className="loader"></span>
              <div className="mt-4 font-bold uppercase text-sm text-slate-300">
                Firebase hazırlanıyor
              </div>
            </div>
          </div>
        );
      }

      if (!loggedIn) {
        return (
          <div className="min-h-screen flex items-center justify-center px-6">
            <div className="panel w-full max-w-sm rounded-[30px] p-8">
              <div className="text-center text-5xl mb-4">🏠</div>
              <h1 className="text-center text-3xl font-black italic uppercase">Akıllı Ev</h1>
              <p className="text-center text-slate-400 text-sm mt-2 mb-6">PIN ile giriş yap</p>

              <input
                type="text"
                value={pin}
                onChange={(e) => setPin(e.target.value)}
                placeholder="0000"
                className="w-full rounded-[20px] bg-slate-900 border border-white/10 px-5 py-4 text-center text-2xl outline-none mb-4"
              />

              <button
                onClick={login}
                className="w-full rounded-[20px] bg-indigo-600 hover:bg-indigo-500 py-4 font-bold uppercase btn-touch"
              >
                Giriş Yap
              </button>

              {errorMsg && (
                <div className="mt-4 text-red-400 text-center text-sm">{errorMsg}</div>
              )}
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          <header className="px-6 py-6 border-b border-white/5 flex items-center justify-between bg-slate-950/40">
            <div className="flex items-center gap-4">
              <div className="w-16 h-16 rounded-[18px] bg-indigo-600 flex items-center justify-center text-3xl">
                🏠
              </div>
              <div className="text-2xl font-black italic uppercase tracking-tight">
                Akıllı Ev
              </div>
            </div>

            <button
              onClick={() => {
                setLoggedIn(false);
                setPin("");
              }}
              className="panel px-4 py-3 rounded-2xl btn-touch"
            >
              Çıkış
            </button>
          </header>

          <main className="max-w-3xl mx-auto px-6 py-8">
            {errorMsg && (
              <div className="mb-5 rounded-[18px] border border-red-500/50 bg-red-500/10 px-5 py-4 text-red-400 text-center font-semibold">
                {errorMsg}
              </div>
            )}

            <div className="mb-5 rounded-[32px] bg-indigo-950/70 border border-white/5 px-8 py-10 text-center">
              <div className="text-4xl font-black italic uppercase text-indigo-300 tracking-tight">
                Ev Kontrol Üssü
              </div>
              <div className="text-slate-400 text-sm font-bold uppercase tracking-[0.2em] mt-2">
                Sistem Güvenliği Aktif
              </div>
            </div>

            <div className="space-y-4">
              <Toggle
                title="Salon Işığı"
                emoji="💡"
                active={homeData.light}
                onClick={() => toggleField("light")}
                activeClass="bg-yellow-500"
                disabled={loading}
              />

              <Toggle
                title="Mutfak Işığı"
                emoji="🍽️"
                active={homeData.kitchen}
                onClick={() => toggleField("kitchen")}
                activeClass="bg-blue-500"
                disabled={loading}
              />

              <Toggle
                title="Akıllı Priz"
                emoji="🔌"
                active={homeData.plug}
                onClick={() => toggleField("plug")}
                activeClass="bg-emerald-500"
                disabled={loading}
              />

              <Toggle
                title="Klima Sistemi"
                emoji="❄️"
                active={homeData.ac}
                onClick={() => toggleField("ac")}
                activeClass="bg-cyan-500"
                disabled={loading}
              />

              <Toggle
                title="Bahçe Aydınlatma"
                emoji="🌞"
                active={homeData.garden}
                onClick={() => toggleField("garden")}
                activeClass="bg-orange-500"
                disabled={loading}
              />
            </div>
          </main>

          <div className="fixed bottom-6 left-1/2 -translate-x-1/2 panel rounded-[24px] px-6 py-4 flex items-center gap-3">
            {loading ? <span className="loader"></span> : <span>🔄</span>}
            <span className="text-xs font-bold uppercase tracking-[0.2em] text-white">
              {loading ? "Komut Gönderiliyor" : "Canlı Senkronizasyon"}
            </span>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
